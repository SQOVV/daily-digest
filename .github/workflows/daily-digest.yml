name: Daily Digest

on:
  schedule:
    # UTC 01:00 = Beijing 09:00 (daily at 9 AM)
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate daily digest
        run: python digest.py --no-open

      - name: Commit and push
        run: |
          git config user.name "daily-digest-bot"
          git config user.email "bot@daily-digest.local"
          git add daily-digest-*.md config.json codex-resources.md
          git diff --cached --quiet || git commit -m "daily digest $(date +'%Y-%m-%d')"
          git push
